<div class="login-page" dir="rtl">
  <p-toast position="top-center"></p-toast>

  <!-- ── 3D Background ── -->
  <div class="bg-scene" >
    <div class="cube cube-1"></div>
    <div class="cube cube-2"></div>
    <div class="cube cube-3"></div>
    <div class="cube cube-4"></div>
    <div class="cube cube-5"></div>
    <div class="ring ring-1"></div>
    <div class="ring ring-2"></div>
    <div class="particles">
      <span></span><span></span><span></span>
      <span></span><span></span><span></span>
      <span></span><span></span><span></span>
      <span></span><span></span><span></span>
    </div>
  </div>

  <!-- ── Glow Orbs ── -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <!-- ── Card ── -->
  <div class="login-card">

    <!-- Top Accent -->
    <div class="card-accent"></div>

    <!-- Logo -->
    <div class="card-logo"  [routerLink]="['/']">
      <div class="logo-3d">
        <div class="logo-face front">
          <i class="pi pi-graduation-cap"></i>
        </div>
        <div class="logo-face back"></div>
        <div class="logo-face left"></div>
        <div class="logo-face right"></div>
        <div class="logo-face top"></div>
        <div class="logo-face bottom"></div>
      </div>
    </div>

    <!-- Heading -->
    <div class="card-heading">
      <h1>أهلاً بعودتك</h1>
      <p>سجل دخولك لمتابعة تعلمك</p>
    </div>

    <!-- Form -->
    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>

      <!-- Email -->
      <div class="field" [class.field-error]="isInvalid('email')">
        <label for="email">
          <i class="pi pi-envelope"></i>
          البريد الإلكتروني
        </label>
        <div class="input-box">
          <input
            pInputText
            id="email"
            type="email"
            formControlName="email"
            placeholder="example@mail.com"
            autocomplete="email"
            dir="ltr"/>
          <div class="input-line"></div>
        </div>
        @if (isInvalid('email')) {
          <small class="error-msg">
            <i class="pi pi-times-circle"></i>
            {{ getError('email') }}
          </small>
        }
      </div>

      <!-- Password -->
      <div class="field" [class.field-error]="isInvalid('password')">
        <label for="password">
          <i class="pi pi-lock"></i>
          كلمة المرور
        </label>
        <div class="input-box">
          <p-password
            inputId="password"
            formControlName="password"
            placeholder="••••••••"
            [feedback]="false"
            [toggleMask]="true"
            styleClass="w-full"
            autocomplete="current-password">
          </p-password>
          <div class="input-line"></div>
        </div>
        @if (isInvalid('password')) {
          <small class="error-msg">
            <i class="pi pi-times-circle"></i>
            {{ getError('password') }}
          </small>
        }
      </div>

      <!-- Extras -->
      <div class="form-extras">
        <label class="remember-label">
          <p-checkbox formControlName="remember" [binary]="true" inputId="remember">
          </p-checkbox>
          <span>تذكرني</span>
        </label>
        <a routerLink="/forgot-password" class="forgot-link">نسيت كلمة المرور؟</a>
      </div>

      <!-- Submit -->
      <button type="submit" class="submit-btn" [disabled]="isLoading()">
        <span class="btn-bg"></span>
        <span class="btn-content">
          @if (isLoading()) {
            <i class="pi pi-spin pi-spinner"></i>
            <span>جارٍ الدخول...</span>
          } @else {
            <i class="pi pi-sign-in"></i>
            <span>دخول</span>
          }
        </span>
      </button>

    </form>

    <!-- Divider -->
    <div class="divider"><span>أو</span></div>

    <!-- Social -->
    <div class="social-btns">
      <button class="social-btn">
        <svg width="18" height="18" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        <span>Google</span>
      </button>
      <button class="social-btn">
        <i class="pi pi-github"></i>
        <span>GitHub</span>
      </button>
    </div>

    <!-- Register -->
    <p class="register-hint">
      ليس لديك حساب؟
      <a routerLink="/register">سجل الآن مجاناً</a>
    </p>

  </div>
</div>
